<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Конспекты">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Конспекты студентов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            padding-bottom: 2rem;
        }
        .card-note {
            transition: transform 0.2s;
        }
        .card-note:hover {
            transform: translateY(-5px);
        }
        .btn-upload {
            border-radius: 50px;
            padding: 10px 25px;
        }
        .container {
            max-width: 800px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="display-6">
                <i class="bi bi-journal-bookmark-fill"></i> Конспекты студентов
            </h1>
            <a href="/upload" class="btn btn-primary btn-upload">
                <i class="bi bi-cloud-upload"></i> Загрузить
            </a>
        </div>

        {% if notes %}
            <div class="row">
                {% for note in notes %}
                    <div class="col-md-6 mb-3">
                        <div class="card card-note shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title">{{ note.title }}</h5>
                                <h6 class="card-subtitle mb-2 text-muted">{{ note.subject }}</h6>
                                <a href="/uploads/{{ note.filename }}" class="btn btn-sm btn-outline-primary mt-2" download>
                                    <i class="bi bi-download"></i> Скачать
                                </a>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="alert alert-info text-center">
                <i class="bi bi-info-circle"></i> Пока нет ни одного конспекта. Нажмите «Загрузить», чтобы добавить.
            </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js')
            .then(reg => console.log('SW registered', reg))
            .catch(err => console.log('SW registration failed', err));
    }
</script>
</body>
</html>
