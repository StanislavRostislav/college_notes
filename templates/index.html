<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>📚 College Notes</h1>

<a href="/upload">Загрузить</a>
<a href="/login">Войти</a>

<div class="grid">
{% for note in notes %}
<div class="card">
    <h2>{{note.title}}</h2>
    <p>{{note.subject}} | {{note.category}}</p>
    <p>Автор: {{note.owner.username}}</p>

    <a href="/download/{{note.id}}">📥 Скачать</a>

    <form action="/like/{{note.id}}" method="post">
        <button>❤️ {{note.likes}}</button>
    </form>

    <form action="/comment/{{note.id}}" method="post">
        <input name="text" placeholder="Комментарий">
    </form>

    {% for c in note.comments %}
        <p>💬 {{c.text}}</p>
    {% endfor %}
</div>
{% endfor %}
</div>

</body>
</html>
