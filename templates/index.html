<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/app.js"></script>
</head>
<body>

<div class="navbar">
    <div>📚 Конспекты</div>
    <div>
        <a href="/">Главная</a>
        <a href="/upload">Загрузить</a>
        <a href="/login">Вход</a>
    </div>
</div>

<div class="header">🚀 College Notes</div>

<div class="search">
    <input id="search" onkeyup="searchNotes()" placeholder="Поиск...">
</div>

<div class="grid">
{% for note in notes %}
<div class="card">

    <h2>{{note.title}}</h2>

    <p>{{note.subject}} • {{note.category}}</p>
    <p>👤 {{note.owner.username}}</p>

    <a href="/download/{{note.id}}">⬇ Скачать</a>

    <br><br>

    <button class="btn" onclick="like({{note.id}})">
        ❤️ {{note.likes}}
    </button>

    <br><br>

    <input id="comment-{{note.id}}" placeholder="Комментарий">
    <button class="btn" onclick="comment({{note.id}})">Отправить</button>

    {% for c in note.comments %}
        <div class="comment">💬 {{c.text}}</div>
    {% endfor %}

</div>
{% endfor %}
</div>

</body>
</html>
