<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">
    <div>📚 Конспекты</div>
    <div>
        <a href="/">Главная</a>
        <a href="/upload">Загрузить</a>
        <a href="/login">Вход</a>
    </div>
</div>

<div class="center">

    <div class="card">

        <h2>🚀 Загрузка конспекта</h2>

        <form method="post" enctype="multipart/form-data">

            <input name="title" placeholder="Название" required>
            <input name="subject" placeholder="Предмет" required>
            <input name="category" placeholder="Тип (лекция / практика)" required>

            <label class="file-box">
                📂 Перетащи или выбери файл
                <input type="file" name="file" required style="display:none;">
            </label>

            <button class="btn">Загрузить</button>

        </form>

    </div>

</div>

</body>
</html>
