<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка конспекта</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="page">
        <div class="navbar">
            <div class="brand">
                <div class="brand-logo">📚</div>
                <div class="brand-text">
                    <h1>College Notes</h1>
                    <p>Добавление нового материала</p>
                </div>
            </div>

            <div class="nav-links">
                <a class="nav-link" href="/">Главная</a>
                <a class="nav-link nav-link-primary" href="/upload">Загрузить</a>
                <a class="nav-link" href="/login">Вход</a>
            </div>
        </div>

        <div class="center-wrap">
            <div class="auth-card">
                <h2>🚀 Загрузка конспекта</h2>
                <p>Заполни информацию о материале и прикрепи файл.</p>

                <form class="form" method="post" enctype="multipart/form-data">
                    <input name="title" placeholder="Название" required>
                    <input name="subject" placeholder="Предмет" required>
                    <input name="category" placeholder="Тип: лекция / практика / методичка" required>

                    <div class="file-drop">
                        <div>📂 Выбери файл для загрузки</div>
                        <input type="file" name="file" required>
                    </div>

                    <button class="btn btn-primary" type="submit">Загрузить</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
