<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="/static/manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="apple-touch-icon" href="/static/icon-192.png">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
        }
        .card {
            border-radius: 20px;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="col-md-6 mx-auto">

        <div class="card p-4 shadow">

            <h3 class="mb-4 text-center">📤 Загрузить конспект</h3>

            <form action="/upload" method="post" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">Название</label>
                    <input type="text" name="title" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Предмет</label>
                    <input type="text" name="subject" class="form-control" placeholder="Математика" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Тип</label>
                    <input type="text" name="category" class="form-control" placeholder="Лекция / Практика" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Файл</label>
                    <input type="file" name="file" class="form-control" required>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-primary">Загрузить</button>
                    <a href="/" class="btn btn-secondary">Назад</a>
                </div>

            </form>

        </div>

    </div>
</div>

</body>
</html>
