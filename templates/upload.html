<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка конспекта</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card upload-card">
            <a class="back-link" href="/">← На главную</a>
            <h1>Загрузить конспект</h1>
            <p class="auth-subtitle">Добавь материал, чтобы другие студенты могли им пользоваться.</p>

            <form action="/upload" method="post" enctype="multipart/form-data" class="auth-form">
                <input class="input" type="text" name="title" placeholder="Название" required>
                <input class="input" type="text" name="subject" placeholder="Предмет" required>
                <input class="input" type="text" name="category" placeholder="Тип: лекция / практика" required>
                <input class="input" type="file" name="file" required>
                <button class="btn btn-primary" type="submit">Загрузить</button>
            </form>
        </div>
    </div>
</body>
</html>
